name: Build Smol Slime Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. IMMEDIATE DISK PURGE (The Manual Way)
      # We kill the 3 biggest hogs: .NET, Android, and Haskell.
      - name: 🧹 Scorch Earth Purge
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          docker image prune --all --force
          sudo apt-get clean

      - name: 💻 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 2. INSTALL ONLY NRF ESSENTIALS
      - name: 🧰 Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build gperf python3-venv xz-utils file gcc

      # 3. ARM-ONLY SDK (Saves ~4GB vs Full SDK)
      - name: 🪁 Install Minimal ARM SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.9/zephyr-sdk-0.16.9_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.16.9_linux-x86_64_minimal.tar.xz -C ~/
          rm zephyr-sdk-0.16.9_linux-x86_64_minimal.tar.xz
          ~/zephyr-sdk-0.16.9/setup.sh -c -t arm-zephyr-eabi

      # 4. SHALLOW SYNC (The "Space Saver")
      - name: 🐍 Initialize West
        run: |
          python3 -m venv ~/.venv
          source ~/.venv/bin/activate
          pip install west ninja
          west init -l .
          # This is critical: --narrow and --depth=1 prevents 10GB of git history
          west update --narrow -o=--depth=1
          west zephyr-export
          pip install -r zephyr/scripts/requirements.txt

      # 5. BUILD FOR SMOL SLIME
      - name: 🔨 Build Sharkee Smol Slime
        run: |
          source ~/.venv/bin/activate
          # Building for the nRF52840 (Holyiot)
          west build -b nrf52840dk/nrf52840 -p always -- -DNCS_TOOLCHAIN_VERSION=NONE

      - name: 💾 Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: Sharkee-Smol-Slime-Firmware
          path: |
            build/zephyr/zephyr.hex
            build/zephyr/zephyr.uf2
