name: Build Smol Slime Firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. THE MASSIVE PURGE
      # We manually wipe the biggest offenders before running any actions.
      - name: 🧹 Scorch Earth Disk Purge
        run: |
          echo "=== Disk Space Before Purge ==="
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force
          echo "=== Disk Space After Purge ==="
          df -h

      # 2. REPARTITION THE DISK
      # This moves the workspace to the newly freed space.
      - name: 🚀 Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 2048
          swap-size-mb: 1024
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: 💻 Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # 3. INSTALL ONLY ABSOLUTE MINIMALS
      - name: 🧰 Install Build Essentials
        run: |
          sudo apt-get update
          sudo apt-get install -y git cmake ninja-build gperf python3-venv xz-utils file gcc

      - name: 🪁 Install Minimal ARM SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.9/zephyr-sdk-0.16.9_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.16.9_linux-x86_64_minimal.tar.xz -C ~/
          rm zephyr-sdk-0.16.9_linux-x86_64_minimal.tar.xz
          ~/zephyr-sdk-0.16.9/setup.sh -c -t arm-zephyr-eabi

      # 4. SHALLOW SYNC
      - name: 🐍 Initialize West
        run: |
          python3 -m venv ~/.venv
          source ~/.venv/bin/activate
          pip install west ninja
          west init -l .
          west update --narrow -o=--depth=1
          west zephyr-export
          pip install -r zephyr/scripts/requirements.txt

      # 5. BUILD
      - name: 🔨 Build Sharkee Smol Slime
        run: |
          source ~/.venv/bin/activate
          west build -b nrf52840dk/nrf52840 -p always -- -DNCS_TOOLCHAIN_VERSION=NONE

      - name: 💾 Upload
        uses: actions/upload-artifact@v4
        with:
          name: Sharkee-Smol-Slime
          path: build/zephyr/zephyr.*
