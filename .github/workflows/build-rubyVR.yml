name: Build RubyVR Firmware

on:
  push:
    branches: [ master ]
    paths:
      - 'boards/RubyVR.overlay'
      - 'src/**'
      - 'prj.conf'
      - 'CMakeLists.txt'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zephyrprojectrtos/ci:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix git safe directory
        run: |
          git config --global --add safe.directory /__w/SlimeVR-Tracker-nRF-SharkeeHaptics/SlimeVR-Tracker-nRF-SharkeeHaptics

      - name: Initialize west workspace
        run: |
          west init -l .
          west update

      - name: Build RubyVR firmware
        run: |
          west build -b nrf52840dk/nrf52840 -p auto -- -DDTC_OVERLAY_FILE=boards/RubyVR.overlay

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: RubyVR-firmware
          path: |
            build/zephyr/app_update.hex
            build/zephyr/app_update.bin
            build/zephyr/zephyr.elf
          retention-days: 30

      - name: Build Summary
        if: success()
        run: |
          echo "✅ RubyVR Firmware Build Successful!"
          ls -lah build/zephyr/
