name: Build RubyVR Firmware

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zephyrprojectrtos/ci:latest
    env:
      ZEPHYR_SDK_INSTALL_DIR: /opt/toolchains/zephyr-sdk-0.16.5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git safe directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Setup Zephyr SDK
        run: |
          mkdir -p /opt/toolchains
          cd /opt/toolchains
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.16.5/zephyr-sdk-0.16.5_linux-x86_64.tar.xz
          tar -xf zephyr-sdk-0.16.5_linux-x86_64.tar.xz
          cd zephyr-sdk-0.16.5
          ./setup.sh -t arm-zephyr-eabi -h -c

      - name: Initialize west workspace
        run: |
          west init -l .
          west update

      - name: Clean build directory
        run: |
          rm -rf build/

      - name: Build RubyVR firmware (nrf52840dk/nrf52840)
        run: |
          west build -b nrf52840dk/nrf52840 -p auto -- -DDTC_OVERLAY_FILE=boards/RubyVR.overlay

      - name: List build artifacts
        run: |
          echo "=== Build Artifacts ==="
          find build -type f \( -name "*.hex" -o -name "*.bin" -o -name "*.elf" -o -name "*.uf2" \) -exec ls -lh {} \;

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: RubyVR-firmware
          path: |
            build/zephyr/app_update.hex
            build/zephyr/app_update.bin
            build/zephyr/zephyr.elf
          retention-days: 30

      - name: Build Summary
        if: success()
        run: |
          echo "✅ RubyVR Firmware Build Successful!"
          echo "Board: nrf52840dk/nrf52840"
          echo "Overlay: boards/RubyVR.overlay"
          ls -lah build/zephyr/ | grep -E "app_update|zephyr.elf"
