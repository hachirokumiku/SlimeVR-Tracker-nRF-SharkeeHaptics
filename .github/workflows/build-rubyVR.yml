name: Build RubyVR Firmware

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
   container:
      image: zephyrprojectrtos/zephyr-build:v0.16.9-arm
    
    steps:
      - name: Free Disk Space
        # Clears pre-installed GitHub bloat to make room for 'west update'
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          docker system prune -af

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git safe directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Initialize west workspace
        run: |
          west init -l .
          west update
          # The SDK is already in the container, just need to export it
          west zephyr-export

      - name: Build RubyVR firmware (nrf52840dk/nrf52840)
        # Note: -p auto handles the cleaning for you
        run: |
          west build -b nrf52840dk/nrf52840 -p auto -- -DDTC_OVERLAY_FILE=boards/RubyVR.overlay

      - name: List build artifacts
        run: |
          echo "=== Build Artifacts ==="
          find build/zephyr -type f \( -name "*.hex" -o -name "*.bin" -o -name "*.elf" -o -name "*.uf2" \) -exec ls -lh {} \;

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: RubyVR-firmware
          path: |
            build/zephyr/zephyr.hex
            build/zephyr/zephyr.bin
            build/zephyr/zephyr.elf
          retention-days: 30
